<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>WebAR</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">
  <a-scene embedded arjs>
    <a-marker preset="hiro">
      <a-box
        position="-1 0.5 0"
        rotation="0 45 0"
        scale="0.7 0.7 0.7"
        color="red"
        animation="property: rotation; to: 0 405 0; loop: true; dur: 3000">
      </a-box>

      <a-sphere
        position="0 0.7 0"
        radius="0.4"
        color="blue">
      </a-sphere>

      <a-cylinder
        position="1 0.6 0"
        radius="0.25"
        height="1"
        color="green">
      </a-cylinder>

      <a-text
        value="Saeed Alomari"
        position="-1 1.5 0"
        rotation="-90 0 0"
        color="black"
        scale="1 1 1">
      </a-text>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
